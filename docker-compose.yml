version: '3.8'

services:
  # Go Backend - WebSocket server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GO_PORT=8080
      - GO_WEBSOCKET_PATH=/ws
      - GO_MAX_CONNECTIONS=1000
      - AI_ENGINE_URL=http://ai-engine:8000
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      - ai-engine
    networks:
      - ai-call-center
    restart: unless-stopped

  # Python AI Engine
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHON_PORT=8000
      - MCP_SERVER_URL=http://mcp-server:8001
      - AUDIO_SAMPLE_RATE=24000
      - AUDIO_CHANNELS=1
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    env_file:
      - .env
    depends_on:
      - mcp-server
    networks:
      - ai-call-center
    restart: unless-stopped

  # MCP Server (if needed)
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MCP_PORT=8001
      - DATABASE_URL=postgresql://user:password@postgres:5432/ai_call_center
    depends_on:
      - postgres
    networks:
      - ai-call-center
    restart: unless-stopped

  # Frontend - Static files served by nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-call-center
    restart: unless-stopped

  # PostgreSQL Database (optional)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=ai_call_center
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-call-center
    restart: unless-stopped

  # Redis for session storage (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-call-center
    restart: unless-stopped

networks:
  ai-call-center:
    driver: bridge

volumes:
  postgres_data:
